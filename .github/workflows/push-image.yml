name: Push server image to Docker Hub

# Builds the CTTC server image and pushes it to the registry ref in
# releases/repo/image.json (currently osteck/cttc-server) -- see
# releases/shared/build-image.sh, which this just logs in before running.
# Manual for now: trigger from the Actions tab (or `gh workflow run`).
on:
  workflow_dispatch:

jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Log in to Docker Hub
        run: echo "${{ secrets.DOCKER_PWD }}" | docker login --username osteck@gmail.com --password-stdin

      - name: Build + push the server image
        run: releases/shared/build-image.sh --force
