# https://taskfile.dev  —  requires Task ≥ 3.28
version: '3'

vars:
  SERVER: server
  # Strip any active venv from another project so uv always uses the local .venv.
  UV: env -u VIRTUAL_ENV uv
  # VSCode's extension host exports ELECTRON_RUN_AS_NODE, which turns the
  # Electron binary into plain Node — strip it so the app can launch.
  ELECTRON: env -u ELECTRON_RUN_AS_NODE npx electron
  # releases/ (the cttc-release submodule) keeps each platform's installer
  # + deploy bundle on its own branch (windows/mac/linux); main only holds
  # what's shared (the server image build script, the registry-pull compose
  # variant). `git -C` targets that dir without needing a `cd` to persist
  # across cmds -- Task runs every `cmds:` entry as its own subprocess, so a
  # plain `cd releases && ...` in one entry has no effect on the next.

# ── Default ────────────────────────────────────────────────────────────────
tasks:
  default:
    desc: List all available tasks
    silent: true
    cmd: task --list

  # ── Setup ─────────────────────────────────────────────────────────────────
  install:
    desc: Install all dependencies (Electron via npm, server venv via uv)
    cmds:
      - npm install
      - "{{.UV}} sync --project {{.SERVER}}"

  # ── Development ───────────────────────────────────────────────────────────
  start:
    desc: Launch the app (spawns the Python server automatically)
    cmd: "{{.ELECTRON}} ."

  start:files:
    desc: "Launch the app with files opened      [usage: task start:files -- a.jsonl b.log]"
    cmd: "{{.ELECTRON}} . {{.CLI_ARGS}}"

  serve:
    desc: "Run the Python server alone on a fixed port for API work   [usage: task serve -- 8765]"
    dir: '{{.SERVER}}'
    cmd: "{{.UV}} run server.py --port {{.CLI_ARGS | default \"8765\"}}"

  screenshot:
    desc: Headless UI verification — capture the demo to shot.png and quit
    cmds:
      - env -u ELECTRON_RUN_AS_NODE CTTC_SCREENSHOT={{.PWD}}/shot.png CTTC_CURSOR_OFFSET=765000
        npx electron . demo/data/stats.jsonl demo/data/c3_api.log demo/data/c3_worker.log
      - cmd: echo "Screenshot → shot.png"
        silent: true

  # ── Demo data ─────────────────────────────────────────────────────────────
  demo:
    desc: Generate 30 minutes of correlated demo history into demo/data/
    cmd: "{{.UV}} run --project {{.SERVER}} python demo/generate_demo.py"

  demo:live:
    desc: Generate demo history and keep appending live ticks (Ctrl+C to stop)
    interactive: true
    cmd: "{{.UV}} run --project {{.SERVER}} python demo/generate_demo.py --live"

  demo:start:
    desc: Generate demo data, then launch the app with it
    cmds:
      - task: demo
      - "{{.ELECTRON}} . demo/data/stats.jsonl demo/data/c3_api.log demo/data/c3_worker.log"

  # ── Tests ─────────────────────────────────────────────────────────────────
  test:
    desc: Run everything — server unit tests (with coverage), main-process unit tests, then renderer E2E
    cmds:
      - task: test:server
      - task: test:unit
      - task: test:e2e

  test:server:
    desc: Server test suite with line coverage (uv run pytest)
    dir: '{{.SERVER}}'
    cmd: "{{.UV}} run --group dev pytest tests/ -q --cov=server --cov-report=term-missing"

  test:unit:
    desc: Main-process unit tests (lib/*.js) — Node's built-in test runner, no Electron needed
    cmd: node --test test/unit/*.test.js

  test:e2e:
    desc: Renderer E2E — runs test/renderer-spec.js inside the real app against demo data
    cmd: ./test/run-e2e.sh

  # ── Linting (server/ — the only Python in this app) ──────────────────────
  lint:
    desc: Check server/ with ruff
    dir: '{{.SERVER}}'
    cmd: "{{.UV}} run ruff check ."

  lint:fix:
    desc: Check server/ with ruff, auto-fix where possible
    dir: '{{.SERVER}}'
    cmd: "{{.UV}} run ruff check --fix ."

  # ── Formatting ────────────────────────────────────────────────────────────
  format:
    desc: Format server/ in-place with ruff
    dir: '{{.SERVER}}'
    cmd: "{{.UV}} run ruff format ."

  format:check:
    desc: Check server/ formatting without modifying files (used in CI)
    dir: '{{.SERVER}}'
    cmd: "{{.UV}} run ruff format --check ."

  # ── Type checking ─────────────────────────────────────────────────────────
  typecheck:
    desc: Run ty (Astral's type checker) on server/'s source (not tests/ -- mostly benign non-null asserts there)
    dir: '{{.SERVER}}'
    cmd: "{{.UV}} run ty check server.py files.py"

  # ── Quality gates ─────────────────────────────────────────────────────────
  check:
    desc: Run all quality gates — JS syntax checks, server import, lint, format check, typecheck
    cmds:
      - node --check main.js
      - node --check preload.js
      - node --check renderer/app.js
      - node --check lib/connection-config.js
      - node --check lib/ssh-tunnel.js
      - node --check lib/server-provision.js
      - node --check lib/docker-check.js
      - node --check lib/ssh-key-file.js
      - "{{.UV}} run --project {{.SERVER}} python -c 'import sys; sys.path.insert(0, \"{{.SERVER}}\"); import server; print(\"server imports ok,\", server.JSON_IMPL)'"
      - task: lint
      - task: format:check
      - task: typecheck

  fix:
    desc: Auto-fix all server/ lint issues and reformat
    cmds:
      - task: lint:fix
      - task: format

  ci:
    desc: Full CI pipeline — install → check
    cmds:
      - task: install
      - task: check

  # ── Release ───────────────────────────────────────────────────────────────
  # Each task commits its own branch's result before finishing (rather than
  # leaving it staged) -- with one branch per platform, an uncommitted build
  # on e.g. `windows` blocks `git checkout mac` for the next platform in
  # build:release:all with "local changes would be overwritten". The `diff
  # --cached --quiet ||` guard skips the commit (instead of failing the
  # task) on a no-op rebuild, e.g. re-running after nothing changed.
  build:release:win:
    desc: "Build the Windows installer + deploy bundle   [usage: task build:release:win]"
    cmds:
      - git -C ../releases checkout windows
      - npm run release:win -- {{.CLI_ARGS}}
      - git -C ../releases add -A
      - "git -C ../releases diff --cached --quiet || git -C ../releases commit -m 'chore(windows): rebuild deploy bundle'"

  build:release:mac:
    desc: "Build the macOS installer + deploy bundle   [usage: task build:release:mac]"
    cmds:
      - git -C ../releases checkout mac
      - npm run release:mac -- {{.CLI_ARGS}}
      - git -C ../releases add -A
      - "git -C ../releases diff --cached --quiet || git -C ../releases commit -m 'chore(mac): rebuild deploy bundle'"

  build:release:linux:
    desc: "Build the Linux AppImage + deploy bundle   [usage: task build:release:linux]"
    cmds:
      - git -C ../releases checkout linux
      - npm run release:linux -- {{.CLI_ARGS}}
      - git -C ../releases add -A
      - "git -C ../releases diff --cached --quiet || git -C ../releases commit -m 'chore(linux): rebuild deploy bundle'"

  build:release:all:
    desc: "Build all three platforms' installers + deploy bundles   [usage: task build:release:all]"
    cmds:
      - task: build:release:win
        vars: { CLI_ARGS: '{{.CLI_ARGS}}' }
      - task: build:release:mac
        vars: { CLI_ARGS: '{{.CLI_ARGS}}' }
      - task: build:release:linux
        vars: { CLI_ARGS: '{{.CLI_ARGS}}' }

  # ── Dependencies ──────────────────────────────────────────────────────────
  deps:update:
    desc: Update server packages to their latest allowed versions
    dir: '{{.SERVER}}'
    cmd: uv lock --upgrade

  deps:tree:
    desc: Show the server dependency tree
    dir: '{{.SERVER}}'
    cmd: uv tree

  # ── Clean ─────────────────────────────────────────────────────────────────
  clean:
    desc: Remove generated demo data, screenshots, and caches
    silent: true
    cmd: |
      rm -rf demo/data/ shot.png
      find . -path './node_modules' -prune -o -path './{{.SERVER}}/.venv' -prune \
        -o -type d -name '__pycache__' -print | xargs rm -rf 2>/dev/null || true
      printf '\033[32m✓ Clean\033[0m\n'

  clean:all:
    desc: Remove everything including node_modules and the server venv (run task install to restore)
    cmds:
      - task: clean
      - cmd: rm -rf node_modules/ {{.SERVER}}/.venv/
        silent: true
      - cmd: printf '\033[32m✓ Fully clean\033[0m\n'
        silent: true
