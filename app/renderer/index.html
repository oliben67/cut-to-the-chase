<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; connect-src http://127.0.0.1:* http://localhost:*; style-src 'self'; script-src 'self'; img-src 'self' data:" />
  <title>CTTC Timeline</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header id="toolbar">
    <strong class="app-title">CTTC Timeline</strong>
    <button id="btn-add">＋ Add sources</button>
    <button id="btn-load-sample" title="Load a .cttc metrics file (possibly encrypted)">📂 Load metrics</button>
    <button id="btn-keys" title="Manage encryption keys for .cttc metrics files" hidden>🔑 Keys</button>
    <label class="ctl">window ±<input id="win-secs" type="number" min="0" step="1" value="5" /> s</label>
    <label class="ctl"><input id="chk-follow" type="checkbox" /> follow live</label>
    <button id="btn-style" title="Switch between line plot and histogram"></button>
    <button id="btn-sample" title="Save a time range as .cttc metrics: click, then drag on the charts (shift+drag always works)">✂ metrics</button>
    <span id="status" class="muted"></span>
    <span id="cursor-label" class="cursor-label"></span>
  </header>

  <main id="layout">
    <section id="chart-block">
      <div id="chart-head">
        <span>Telemetry</span>
        <div class="panel-head-right">
          <button id="btn-popout-telemetry" class="icon-btn" title="Open the telemetry charts in their own window">⧉</button>
          <button id="btn-popback-telemetry" class="popback" title="Pop back into the main window" hidden>⤴ Pop back</button>
        </div>
      </div>
      <div id="legend"></div>
      <div id="charts"></div>
      <div id="chart-nav" class="timeline-nav" title="Drag to pan, click to jump, click “now” to center on the present">
        <div class="tl-track">
          <div class="tl-thumb"></div>
          <span class="tl-now-label">now</span>
        </div>
      </div>
      <div id="lanes"></div>
      <div id="host-block" hidden>
        <div id="host-head">
          <span>Host telemetry</span>
          <div class="panel-head-right">
            <button id="btn-popout-host" class="icon-btn" title="Open host telemetry in its own window">⧉</button>
            <button id="btn-host-toggle" class="icon-btn"></button>
            <button id="btn-popback-host" class="popback" title="Pop back into the main window" hidden>⤴ Pop back</button>
          </div>
        </div>
        <div id="host-charts"></div>
        <div id="host-nav" class="timeline-nav" title="Drag to pan, click to jump, click “now” to center on the present">
          <div class="tl-track">
            <div class="tl-thumb"></div>
            <span class="tl-now-label">now</span>
          </div>
        </div>
      </div>
      <div id="empty-state" class="muted">No sources yet — click “＋ Add sources” to attach to a Docker daemon (local or ssh://), or “📂 Load metrics” to open a .cttc file.</div>
    </section>
    <div id="splitter" title="Drag to resize the logs panel"></div>
    <section id="panels"></section>
  </main>

  <div id="tooltip" hidden></div>

  <dialog id="dlg-add">
    <h2>Add sources — Docker</h2>

    <div class="tab-page" id="page-docker">
      <label class="ctl block">Docker host
        <input id="docker-host" type="text" placeholder="empty = local daemon, or ssh://user@host" />
      </label>
      <label class="ctl block" id="ssh-key-row" hidden>SSH key
        <select id="ssh-key"></select>
      </label>
      <div class="ctl">
        <label class="ctl switch-row" title="List running Docker containers/services to pick as sources">
          <span class="switch">
            <input id="btn-ps" type="checkbox" />
            <span class="switch-track"><span class="switch-thumb"></span></span>
          </span>
          <span id="btn-ps-label">Show containers</span>
        </label>
        <button id="btn-ps-refresh" hidden>Refresh</button>
      </div>
      <div id="docker-error" class="error"></div>
      <label class="ctl"><input id="docker-stats" type="checkbox" checked /> collect <code>docker stats</code> telemetry <span id="docker-stats-note" class="tdoc"></span></label>
      <label class="ctl"><input id="docker-host-stats" type="checkbox" checked /> collect host telemetry (CPU/MEM/NET of the docker host) <span id="docker-host-stats-note" class="tdoc"></span></label>
      <label class="ctl block">poll interval <input id="docker-interval" type="number" min="1" value="5" /> s</label>
      <div id="docker-targets"></div>
    </div>

    <fieldset id="transforms-box">
      <legend>Transforms applied to new log sources</legend>
      <div id="transforms-list" class="muted">none found</div>
    </fieldset>

    <div class="dlg-actions">
      <button id="dlg-cancel">Cancel</button>
      <button id="dlg-ok" class="primary">Add</button>
    </div>
  </dialog>

  <dialog id="dlg-export">
    <h2>Save metrics</h2>
    <label class="ctl block">
      <input id="export-host" type="checkbox" />
      Include host telemetry (CPU/MEM/NET of the docker host)
    </label>
    <div id="export-host-note" class="tdoc"></div>
    <div class="dlg-actions">
      <button id="dlg-export-cancel">Cancel</button>
      <button id="dlg-export-ok" class="primary">Save…</button>
    </div>
  </dialog>

  <dialog id="dlg-snapshot">
    <h2>Snapshot</h2>
    <div id="snapshot-meta" class="muted"></div>
    <label class="ctl block">
      <input id="snap-all-sources" type="checkbox" checked />
      Include all open containers/hosts (not just the selected ones)
    </label>
    <label class="ctl">
      <input id="snap-logs" type="checkbox" checked />
      Include nearby log entries
    </label>
    <label class="ctl switch-row" title="Enlarge the snapshot around the selected time: widen the log context by N entries, or add extra telemetry/log slices N seconds before and after">
      <span class="switch">
        <input id="snap-panorama-on" type="checkbox" />
        <span class="switch-track"><span class="switch-thumb"></span></span>
      </span>
      panorama
      <input id="snap-panorama-value" type="number" min="0" step="1" value="3" disabled />
      <select id="snap-panorama-unit" disabled>
        <option value="entries" selected>entries</option>
        <option value="seconds">seconds</option>
      </select>
    </label>
    <div class="btn-group" id="snapshot-view-switch">
      <button id="snap-view-raw" class="primary">Raw</button>
      <button id="snap-view-json">JSON</button>
    </div>
    <div id="snapshot-props" class="snapshot-body"></div>
    <pre id="snapshot-json" class="snapshot-body" hidden></pre>
    <div class="dlg-actions">
      <button id="dlg-snapshot-close">Close</button>
      <button id="dlg-snapshot-save-txt">💾 Save as TXT…</button>
      <button id="dlg-snapshot-save" class="primary" hidden>💾 Save as JSON…</button>
    </div>
  </dialog>

  <script src="app.js"></script>
</body>
</html>
